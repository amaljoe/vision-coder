# OpenEnv Environment Manifest
# https://github.com/meta-pytorch/OpenEnv

name: vision-coder
version: "0.1.0"
description: >
  Screenshot-to-HTML reinforcement learning environment.
  An AI agent receives a UI screenshot and must generate HTML code that
  visually reproduces the layout. Reward is a weighted combination of
  format correctness, HTML validity, DOM structural similarity, and
  CLIP-based visual fidelity.

author: vision-coder
license: MIT

# Task type for the OpenEnv registry
task_type: code_generation
modalities:
  - vision
  - text

# OpenEnv interface compliance
interface:
  reset: POST /reset
  step:  POST /step
  state: GET  /state
  close: DELETE /close

# Action / Observation schema
action:
  type: object
  properties:
    html:
      type: string
      description: Raw HTML code generated by the agent

observation:
  type: object
  properties:
    done:
      type: boolean
    reward:
      type: number
      nullable: true
    screenshot_b64:
      type: string
      nullable: true
      description: Base64-encoded PNG of the target screenshot (present after reset)
    prompt:
      type: string
      description: Instruction shown to the agent
    metadata:
      type: object

# Reward signals (weights sum to 6×)
rewards:
  format:
    weight: 1.0
    description: >
      Validates markdown fencing (```html```) and presence of <html>/<DOCTYPE> tags.
      Max score: 1.0
  validity:
    weight: 1.0
    description: >
      BeautifulSoup parseability, structural completeness (<html>/<head>/<body>),
      and tag diversity. Max score: 1.0
  structural:
    weight: 1.0
    description: >
      DOM tag-sequence similarity via longest-common-subsequence ratio.
      Max score: 1.0
  clip:
    weight: 3.0
    description: >
      CLIP ViT-B/32 image-image cosine similarity between rendered HTML
      screenshot and reference. Primary training signal. Max score: 1.0

# Dataset
dataset:
  name: HuggingFaceM4/WebSight
  version: v0.2
  split: train
  description: >
    UI screenshot + ground-truth HTML pairs from HuggingFace WebSight dataset.
    Default: 2000 samples loaded from local cache.

# Deployment
server:
  framework: fastapi
  port: 8080
  dockerfile: Dockerfile

# HuggingFace Spaces deployment target
spaces:
  sdk: docker
  hardware: cpu-basic
